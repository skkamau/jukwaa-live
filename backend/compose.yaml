services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: jukwaa
      POSTGRES_PASSWORD: jukwaa_dev_only
      POSTGRES_DB: jukwaa_dev
    ports:
      - '5432:5432'
    volumes:
      - jukwaa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jukwaa -d jukwaa_dev']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  jukwaa_postgres_data:
